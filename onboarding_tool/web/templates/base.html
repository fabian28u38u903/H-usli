<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Onboarding Analyse Tool{% endblock %}</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #F0F2F5; color: #2C3E50; }

    /* Nav */
    nav { background: #1A1A2E; color: white; padding: 0 30px; display: flex;
          align-items: center; justify-content: space-between; height: 60px; }
    nav .logo { font-size: 18px; font-weight: bold; color: white; text-decoration: none; }
    nav .logo span { color: #E94560; }
    nav a { color: #BDC3C7; text-decoration: none; margin-left: 20px; font-size: 14px; }
    nav a:hover { color: white; }

    /* Layout */
    .container { max-width: 1100px; margin: 30px auto; padding: 0 20px; }

    /* Cards */
    .card { background: white; border-radius: 10px; padding: 25px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 20px; }
    .card h2 { font-size: 18px; margin-bottom: 15px; color: #1A1A2E; }

    /* Buttons */
    .btn { display: inline-block; padding: 10px 20px; border-radius: 6px;
           font-size: 14px; font-weight: 600; cursor: pointer; border: none;
           text-decoration: none; transition: opacity 0.2s; }
    .btn:hover { opacity: 0.85; }
    .btn-primary { background: #E94560; color: white; }
    .btn-dark { background: #1A1A2E; color: white; }
    .btn-outline { background: white; color: #1A1A2E; border: 2px solid #1A1A2E; }
    .btn-danger { background: #E74C3C; color: white; }
    .btn-success { background: #27AE60; color: white; }
    .btn-sm { padding: 6px 14px; font-size: 13px; }

    /* Forms */
    .form-group { margin-bottom: 18px; }
    .form-group label { display: block; font-size: 13px; font-weight: 600;
                        color: #555; margin-bottom: 6px; }
    .form-group input, .form-group textarea, .form-group select {
      width: 100%; padding: 10px 12px; border: 1.5px solid #DDE; border-radius: 6px;
      font-size: 14px; font-family: inherit; transition: border-color 0.2s; }
    .form-group input:focus, .form-group textarea:focus {
      outline: none; border-color: #E94560; }
    .form-group textarea { min-height: 90px; resize: vertical; }
    .form-hint { font-size: 12px; color: #999; margin-top: 4px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

    /* Alerts */
    .alert { padding: 12px 16px; border-radius: 6px; margin-bottom: 20px; font-size: 14px; }
    .alert-success { background: #D5F5E3; color: #1E8449; border-left: 4px solid #27AE60; }
    .alert-error { background: #FADBD8; color: #922B21; border-left: 4px solid #E74C3C; }

    /* Status badges */
    .badge { display: inline-block; padding: 3px 10px; border-radius: 20px;
             font-size: 12px; font-weight: 600; }
    .badge-pending { background: #F0F0F0; color: #777; }
    .badge-running { background: #FEF9E7; color: #D68910; }
    .badge-done { background: #D5F5E3; color: #1E8449; }
    .badge-error { background: #FADBD8; color: #922B21; }

    /* Table */
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; padding: 10px 12px; background: #F8F8F8;
         font-size: 13px; color: #555; border-bottom: 2px solid #EEE; }
    td { padding: 12px 12px; font-size: 14px; border-bottom: 1px solid #F0F0F0; }
    tr:hover td { background: #FAFAFA; }

    /* Page header */
    .page-header { display: flex; align-items: center; justify-content: space-between;
                   margin-bottom: 24px; }
    .page-header h1 { font-size: 24px; color: #1A1A2E; }

    /* Stats */
    .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 24px; }
    .stat-card { background: white; border-radius: 10px; padding: 20px;
                 box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    .stat-card .number { font-size: 32px; font-weight: bold; color: #E94560; }
    .stat-card .label { font-size: 13px; color: #777; margin-top: 4px; }

    /* Spinner */
    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #FFF;
               border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .divider { border: none; border-top: 1px solid #EEE; margin: 20px 0; }
  </style>
</head>
<body>
  <nav>
    <a href="{{ url_for('dashboard') }}" class="logo">Onboarding<span>AI</span></a>
    <div>
      <a href="{{ url_for('dashboard') }}">Dashboard</a>
      <a href="{{ url_for('new_customer') }}">+ Neuer Kunde</a>
    </div>
  </nav>

  <div class="container">
    {% for category, message in get_flashed_messages(with_categories=true) %}
      <div class="alert alert-{{ 'success' if category == 'success' else 'error' }}">
        {{ message }}
      </div>
    {% endfor %}
    {% block content %}{% endblock %}
  </div>
</body>
</html>
